name: Keep Alive — Auto-restart if down

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check site health
        id: health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://vexironathletics.com/api/health || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Site returned HTTP $STATUS"

      - name: Restart app via SSH if unhealthy
        if: steps.health.outputs.status != '200'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 3m
          script: |
            cd ~/domains/vexironathletics.com/public_html
            echo "Site was down (HTTP ${{ steps.health.outputs.status }}), restarting..."
            mkdir -p tmp && touch tmp/restart.txt
            echo "Restart triggered at $(date)"
