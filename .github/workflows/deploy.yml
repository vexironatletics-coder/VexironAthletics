name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_ENV: production
  NEXT_PUBLIC_API_URL: https://vexironathletics.com/api
  NEXT_PUBLIC_SITE_URL: https://vexironathletics.com
  NEXT_PUBLIC_WHATSAPP_NUMBER: +923077229449
  NEXT_PUBLIC_WHATSAPP_MESSAGE: " Hello VexironAthletics! I need help with my order."
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dHJ1ZS1hYXJkdmFyay0zNi5jbGVyay5hY2NvdW50cy5kZXYk
  NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: djw4fv6po

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install --prefix backend
          npm install --prefix frontend

      - name: Build backend
        run: npm run build --prefix backend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Prepare deployment package
        run: |
          mkdir -p release
          cp server.js package.json package-lock.json release/
          mkdir -p release/backend
          cp backend/package.json backend/package-lock.json release/backend/
          cp -r backend/dist release/backend/
          mkdir -p release/frontend
          cp frontend/package.json frontend/package-lock.json frontend/next.config.ts release/frontend/
          cp -r frontend/public release/frontend/
          cp -r frontend/.next release/frontend/
          tar -czf release.tar.gz -C release .

      - name: Upload release to Hostinger
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: release.tar.gz
          target: /tmp/

      - name: Extract, install, and restart on Hostinger
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 20m
          script: |
            set -e

            # Hostinger Git deploy uses .builds/source/repository; fallback is public_html
            DEPLOY_DIRS=(
              "$HOME/domains/vexironathletics.com/public_html/.builds/source/repository"
              "$HOME/domains/vexironathletics.com/public_html"
            )

            PRIMARY=""
            for dir in "${DEPLOY_DIRS[@]}"; do
              mkdir -p "$dir"
              echo "=== Extracting release into $dir ==="
              tar -xzf /tmp/release.tar.gz -C "$dir"
              if [ -z "$PRIMARY" ]; then
                PRIMARY="$dir"
              fi
            done
            rm -f /tmp/release.tar.gz

            echo "=== Primary app directory: $PRIMARY ==="
            cd "$PRIMARY"

            echo "=== Installing production dependencies ==="
            npm install --omit=dev --no-audit --no-fund
            npm install --prefix backend --omit=dev --no-audit --no-fund
            npm install --prefix frontend --omit=dev --no-audit --no-fund

            echo "=== Verifying build artifacts ==="
            test -f backend/dist/createApp.js
            test -f frontend/.next/BUILD_ID

            echo "=== Restarting Node.js app ==="
            mkdir -p tmp && touch tmp/restart.txt

            echo "=== Deploy complete ==="
